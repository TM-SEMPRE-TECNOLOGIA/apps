<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:#161513;font-family:var(--TM-font-sans);padding:20px;color:#EFEDE8}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.sw{border-radius:var(--TM-radius-md);overflow:hidden;border:1px solid #34322E;background:#1F1E1B}
.chip{height:64px}
.meta{padding:8px 10px}
.name{font-size:12px;font-weight:600;color:#EFEDE8}
.hex{font-family:var(--TM-font-mono);font-size:11px;color:#A8A6A0}
</style></head><body>
<div class="row">
<div class="sw"><div class="chip" style="background:#161513;border-bottom:1px solid #34322E"></div><div class="meta"><div class="name">bg</div><div class="hex">#161513</div></div></div>
<div class="sw"><div class="chip" style="background:#1F1E1B;border-bottom:1px solid #34322E"></div><div class="meta"><div class="name">bg-card</div><div class="hex">#1F1E1B</div></div></div>
<div class="sw"><div class="chip" style="background:#2A2926;border-bottom:1px solid #34322E"></div><div class="meta"><div class="name">bg-hover</div><div class="hex">#2A2926</div></div></div>
<div class="sw"><div class="chip" style="background:#1A1916;border-bottom:1px solid #34322E"></div><div class="meta"><div class="name">bg-sidebar</div><div class="hex">#1A1916</div></div></div>
<div class="sw"><div class="chip" style="background:#E47A4A"></div><div class="meta"><div class="name">primary-dark</div><div class="hex">#E47A4A</div></div></div>
<div class="sw"><div class="chip" style="background:#EFEDE8"></div><div class="meta"><div class="name">text</div><div class="hex">#EFEDE8</div></div></div>
<div class="sw"><div class="chip" style="background:#A8A6A0"></div><div class="meta"><div class="name">text-muted</div><div class="hex">#A8A6A0</div></div></div>
<div class="sw"><div class="chip" style="background:#6E6C66"></div><div class="meta"><div class="name">text-subtle</div><div class="hex">#6E6C66</div></div></div>
<div class="sw"><div class="chip" style="background:#34322E"></div><div class="meta"><div class="name">border</div><div class="hex">#34322E</div></div></div>
<div class="sw"><div class="chip" style="background:#4A4842"></div><div class="meta"><div class="name">border-hover</div><div class="hex">#4A4842</div></div></div>
<div class="sw"><div class="chip" style="background:#2B2520"></div><div class="meta"><div class="name">primary-light-dark</div><div class="hex">#2B2520</div></div></div>
<div class="sw"><div class="chip" style="background:#232220"></div><div class="meta"><div class="name">bg-muted</div><div class="hex">#232220</div></div></div>
</div>
</body></html>
