<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--tm-bg);padding:24px;font-family:var(--TM-font-sans);color:var(--tm-text)}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.sw{aspect-ratio:1.4;border-radius:4px;border:1px solid var(--tm-border);display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
.n{font-family:var(--TM-font-mono);font-size:11px;font-weight:500;letter-spacing:.04em}
.h{font-family:var(--TM-font-mono);font-size:10px;opacity:.75}
</style></head><body>
<div class="row">
<div class="sw" style="background:#C8541C;color:#fff"><span class="n">primary / 600</span><span class="h">#C8541C · laranja construção</span></div>
<div class="sw" style="background:#A6451A;color:#fff"><span class="n">primary / 700</span><span class="h">#A6451A · hover</span></div>
<div class="sw" style="background:#FBEDE3"><span class="n">primary / 50</span><span class="h">#FBEDE3 · superfície</span></div>
<div class="sw" style="background:#2B2B2B;color:#fff"><span class="n">grafite</span><span class="h">#2B2B2B · acento técnico</span></div>
</div>
</body></html>
