<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--tm-bg);font-family:var(--TM-font-sans);padding:20px;color:var(--tm-text)}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.sw{border-radius:var(--TM-radius-md);overflow:hidden;border:1px solid var(--tm-border);background:var(--tm-bg-card)}
.chip{height:64px}
.meta{padding:8px 10px}
.name{font-size:12px;font-weight:600}
.hex{font-family:var(--TM-font-mono);font-size:11px;color:var(--tm-text-muted)}
</style></head><body>
<div class="row">
<div class="sw"><div class="chip" style="background:#C8541C"></div><div class="meta"><div class="name">primary</div><div class="hex">#C8541C</div></div></div>
<div class="sw"><div class="chip" style="background:#A6451A"></div><div class="meta"><div class="name">primary-hover</div><div class="hex">#A6451A</div></div></div>
<div class="sw"><div class="chip" style="background:#E47A4A"></div><div class="meta"><div class="name">primary-dark</div><div class="hex">#E47A4A</div></div></div>
<div class="sw"><div class="chip" style="background:#FBEDE3"></div><div class="meta"><div class="name">primary-light</div><div class="hex">#FBEDE3</div></div></div>
<div class="sw"><div class="chip" style="background:#2B2B2B"></div><div class="meta"><div class="name">accent-graphite</div><div class="hex">#2B2B2B</div></div></div>
<div class="sw"><div class="chip" style="background:#4F7A3A"></div><div class="meta"><div class="name">success</div><div class="hex">#4F7A3A</div></div></div>
<div class="sw"><div class="chip" style="background:#345878"></div><div class="meta"><div class="name">info-blueprint</div><div class="hex">#345878</div></div></div>
<div class="sw"><div class="chip" style="background:#A33B2A"></div><div class="meta"><div class="name">destructive</div><div class="hex">#A33B2A</div></div></div>
</div>
</body></html>
