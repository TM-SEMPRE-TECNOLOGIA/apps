<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--tm-bg);padding:24px;font-family:var(--TM-font-sans);color:var(--tm-text)}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}
.sw{aspect-ratio:1;border-radius:3px;border:1px solid var(--tm-border);display:flex;flex-direction:column;justify-content:flex-end;padding:8px}
.n{font-family:var(--TM-font-mono);font-size:10px;font-weight:500}
.h{font-family:var(--TM-font-mono);font-size:9px;opacity:.7}
</style></head><body>
<div class="row">
<div class="sw" style="background:#FFFFFF"><span class="n">paper</span><span class="h">#FFFFFF</span></div>
<div class="sw" style="background:#F5F4F1"><span class="n">bg</span><span class="h">#F5F4F1</span></div>
<div class="sw" style="background:#E8E5DE"><span class="n">concrete-100</span><span class="h">#E8E5DE</span></div>
<div class="sw" style="background:#DAD7D0"><span class="n">concrete-200</span><span class="h">#DAD7D0</span></div>
<div class="sw" style="background:#8C8A85;color:#fff"><span class="n">concrete-500</span><span class="h">#8C8A85</span></div>
<div class="sw" style="background:#5C5A55;color:#fff"><span class="n">grafite-600</span><span class="h">#5C5A55</span></div>
<div class="sw" style="background:#34322E;color:#fff"><span class="n">grafite-800</span><span class="h">#34322E</span></div>
<div class="sw" style="background:#2B2B2B;color:#fff"><span class="n">grafite-900</span><span class="h">#2B2B2B</span></div>
<div class="sw" style="background:#1A1A1A;color:#fff"><span class="n">ink</span><span class="h">#1A1A1A</span></div>
<div class="sw" style="background:#161513;color:#fff"><span class="n">night</span><span class="h">#161513</span></div>
</div>
</body></html>
