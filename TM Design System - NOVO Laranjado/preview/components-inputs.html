<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--tm-bg);padding:24px;color:var(--tm-text);font-family:var(--TM-font-sans)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.fg{display:block;margin-bottom:8px}
.lbl{display:block;margin-bottom:6px;font-size:13px;font-weight:500;color:var(--tm-text-muted)}
.in{width:100%;padding:9px 12px;font-family:inherit;font-size:14px;border:1px solid var(--tm-border);border-radius:6px;background:#FFF;color:var(--tm-text);box-sizing:border-box}
.in:focus{outline:none;border-color:#C8541C;box-shadow:0 0 0 3px rgba(200,84,28,.12)}
.help{font-size:12px;color:var(--tm-text-muted);margin-top:4px}
</style></head><body>
<div class="row">
<div class="fg"><label class="lbl">Endereço da obra</label><input class="in" placeholder="Rua, nº, bairro"><p class="help">Endereço completo conforme contrato.</p></div>
<div class="fg"><label class="lbl">Buscar (Ctrl+K)</label><input class="in" placeholder="Buscar inspeção, foto, item..."></div>
</div>
</body></html>
