<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--tm-bg);padding:24px;font-family:var(--TM-font-sans);color:var(--tm-text)}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.sw{aspect-ratio:1.4;border-radius:4px;border:1px solid var(--tm-border);display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff}
.n{font-family:var(--TM-font-mono);font-size:11px;font-weight:500}
.h{font-family:var(--TM-font-mono);font-size:10px;opacity:.85}
</style></head><body>
<div class="row">
<div class="sw" style="background:#4F7A3A"><span class="n">success</span><span class="h">#4F7A3A · oliva</span></div>
<div class="sw" style="background:#345878"><span class="n">info</span><span class="h">#345878 · blueprint</span></div>
<div class="sw" style="background:#C8541C"><span class="n">warning</span><span class="h">#C8541C · laranja</span></div>
<div class="sw" style="background:#A33B2A"><span class="n">danger</span><span class="h">#A33B2A · tijolo</span></div>
</div>
</body></html>
