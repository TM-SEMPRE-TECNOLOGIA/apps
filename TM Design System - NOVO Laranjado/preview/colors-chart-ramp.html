<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--tm-bg);font-family:var(--TM-font-sans);padding:20px;color:var(--tm-text)}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border-radius:var(--TM-radius-md);overflow:hidden;border:1px solid var(--tm-border)}
.cell{padding:14px 12px;color:#fff;font-family:var(--TM-font-mono);font-size:11px;letter-spacing:.1em}
.cell .h{font-size:10px;opacity:.85;display:block}
.note{margin-top:12px;font-size:12px;color:var(--tm-text-muted)}
</style></head><body>
<div class="row">
<div class="cell" style="background:#22c55e"><span class="h">CHART-1</span>#22c55e</div>
<div class="cell" style="background:#10b981"><span class="h">CHART-2</span>#10b981</div>
<div class="cell" style="background:#059669"><span class="h">CHART-3</span>#059669</div>
<div class="cell" style="background:#047857"><span class="h">CHART-4</span>#047857</div>
<div class="cell" style="background:#065f46"><span class="h">CHART-5</span>#065f46</div>
</div>
<p class="note">Mono-green ramp. Charts in TM apps stay within this scale — no rainbow palettes.</p>
</body></html>
