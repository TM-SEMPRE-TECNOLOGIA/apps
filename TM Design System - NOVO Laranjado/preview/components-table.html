<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--tm-bg);padding:24px;color:var(--tm-text);font-family:var(--TM-font-sans)}
table{width:100%;border-collapse:collapse;font-size:12px;background:var(--tm-bg-card);border:1px solid var(--tm-border)}
th{background:var(--tm-bg-muted);text-align:left;padding:8px 10px;font-family:var(--TM-font-mono);font-size:9px;font-weight:600;letter-spacing:.12em;color:var(--tm-text-subtle);text-transform:uppercase;border-bottom:1.5px solid #1A1A1A}
td{padding:9px 10px;border-bottom:1px solid var(--tm-border);vertical-align:top}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--tm-bg-hover)}
td.num{font-family:var(--TM-font-mono);text-align:right;color:var(--tm-text-muted)}
.pill{display:inline-flex;font-family:var(--TM-font-mono);font-size:9px;font-weight:600;letter-spacing:.1em;padding:2px 7px;border-radius:2px}
.pill.w{background:#FBEDE3;color:#A6451A}
.pill.d{background:#F5DCD7;color:#A33B2A}
.pill.k{background:#EAF1E4;color:#3A5A2C}
</style></head><body>
<table>
<thead><tr><th>ITEM</th><th>LOCAL</th><th>ANOMALIA</th><th>CRITICIDADE</th><th class="num">PRAZO</th></tr></thead>
<tbody>
<tr><td>01</td><td>Fachada L · 3º pav.</td><td>Trinca de retração em junta</td><td><span class="pill w">MÉDIO</span></td><td class="num">90 dias</td></tr>
<tr><td>02</td><td>Rufo · cobertura</td><td>Infiltração ativa</td><td><span class="pill d">ALTO</span></td><td class="num">30 dias</td></tr>
<tr><td>03</td><td>Pilar P-04</td><td>Desplacamento de revestimento</td><td><span class="pill k">BAIXO</span></td><td class="num">180 dias</td></tr>
<tr><td>04</td><td>Acesso lateral N</td><td>Pintura desbotada</td><td><span class="pill k">BAIXO</span></td><td class="num">365 dias</td></tr>
</tbody>
</table>
</body></html>
