<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--tm-bg);padding:28px;color:var(--tm-text);font-family:var(--TM-font-sans)}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.sh{background:#FFF;border-radius:6px;padding:24px;text-align:center;font-size:11px;font-family:var(--TM-font-mono);color:var(--tm-text-muted);border:1px solid var(--tm-border)}
.sh b{display:block;color:var(--tm-text);font-family:var(--TM-font-sans);font-weight:600;font-size:13px;margin-bottom:4px}
</style></head><body>
<div class="row">
<div class="sh" style="box-shadow:0 1px 0 0 rgba(26,26,26,.04),0 1px 2px 0 rgba(26,26,26,.04)"><b>sm</b>resting</div>
<div class="sh" style="box-shadow:0 2px 4px -1px rgba(26,26,26,.08),0 1px 2px 0 rgba(26,26,26,.04)"><b>md</b>hover · toasts</div>
<div class="sh" style="box-shadow:0 8px 16px -4px rgba(26,26,26,.10),0 2px 4px -1px rgba(26,26,26,.06)"><b>lg</b>modais</div>
<div class="sh" style="box-shadow:0 16px 24px -6px rgba(26,26,26,.12),0 4px 8px -2px rgba(26,26,26,.06)"><b>xl</b>hero / phone</div>
</div>
</body></html>
