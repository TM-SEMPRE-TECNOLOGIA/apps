<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#C8541C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="TM·Zap">
  <meta name="mobile-web-app-capable" content="yes">
  <title>TM·Zap Inspeção</title>
  <link rel="manifest" href="manifest.json">
  <!-- Ícone Apple -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <!-- Fontes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- Estilos -->
  <link rel="stylesheet" href="styles/app.css">
  <!-- JSZip: geração de ZIP no browser (necessário para exportação) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- conteúdo renderizado por app.js -->
    <div id="app-loading" style="display:flex;align-items:center;justify-content:center;height:100dvh;flex-direction:column;gap:12px;background:#F5F4F1;">
      <div style="width:48px;height:48px;background:#C8541C;border-radius:12px;display:flex;align-items:center;justify-content:center;">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#8C8A85;letter-spacing:0.1em;text-transform:uppercase;">carregando…</div>
    </div>
  </div>

  <!-- Módulo principal (importa os demais como ES modules internamente) -->
  <script type="module" src="js/app.js"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(r => console.log('[SW] registrado:', r.scope))
          .catch(e => console.warn('[SW] falhou:', e));
      });
    }
  </script>
</body>
</html>
