[pytest]
# Configuração do pytest para AutoRelatorio v3.2

testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opções de saída
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra
    --color=yes

# Marcadores customizados
markers =
    slow: Testes que são lentos
    integration: Testes de integração
    e2e: Testes end-to-end
    security: Testes de segurança
    unit: Testes unitários

# Cobertura
# Executar com: pytest --cov=word_utils --cov=routes --cov-report=html
# Depois abrir htmlcov/index.html

minversion = 7.0
