<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--tm-bg);font-family:var(--TM-font-sans);padding:20px;color:var(--tm-text)}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.sw{border-radius:var(--TM-radius-md);overflow:hidden;border:1px solid var(--tm-border);background:var(--tm-bg-card)}
.chip{height:64px}
.meta{padding:8px 10px}
.name{font-size:12px;font-weight:600}
.hex{font-family:var(--TM-font-mono);font-size:11px;color:var(--tm-text-muted)}
</style></head><body>
<div class="row">
<div class="sw"><div class="chip" style="background:#22c55e"></div><div class="meta"><div class="name">primary</div><div class="hex">#22c55e</div></div></div>
<div class="sw"><div class="chip" style="background:#16a34a"></div><div class="meta"><div class="name">primary-hover</div><div class="hex">#16a34a</div></div></div>
<div class="sw"><div class="chip" style="background:#0ea5e9"></div><div class="meta"><div class="name">cyan</div><div class="hex">#0ea5e9</div></div></div>
<div class="sw"><div class="chip" style="background:linear-gradient(135deg,#22c55e,#0ea5e9)"></div><div class="meta"><div class="name">gradient</div><div class="hex">135° green→cyan</div></div></div>
</div>
</body></html>
