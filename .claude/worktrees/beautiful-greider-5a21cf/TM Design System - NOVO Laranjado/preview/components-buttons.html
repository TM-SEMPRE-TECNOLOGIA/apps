<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--tm-bg);padding:24px;color:var(--tm-text);font-family:var(--TM-font-sans)}
.row{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;font-size:14px;font-weight:600;border-radius:6px;cursor:pointer;border:1px solid transparent;font-family:inherit;letter-spacing:.005em}
.p{background:#C8541C;color:#fff}
.s{background:transparent;color:var(--tm-text);border-color:#1A1A1A}
.d{background:transparent;color:#A33B2A;border:1px solid #A33B2A}
.o{background:#FFF;color:var(--tm-text);border:1px solid var(--tm-border)}
</style></head><body>
<div class="row">
<button class="btn p"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Salvar Alterações</button>
<button class="btn s">Cancelar</button>
<button class="btn o">Outline</button>
<button class="btn d">Excluir</button>
</div>
</body></html>
