<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--tm-bg);padding:24px;color:var(--tm-text);font-family:var(--TM-font-sans)}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.sw{background:#FFF;border:1px solid var(--tm-border);padding:14px;text-align:center;font-size:11px;font-family:var(--TM-font-mono);color:var(--tm-text-muted)}
.sw b{display:block;color:var(--tm-text);font-family:var(--TM-font-sans);font-weight:600;font-size:13px;margin-bottom:4px}
</style></head><body>
<div class="row">
<div class="sw" style="border-radius:4px"><b>sm</b>4px · chips</div>
<div class="sw" style="border-radius:6px"><b>md</b>6px · buttons/inputs</div>
<div class="sw" style="border-radius:8px"><b>lg</b>8px · cards</div>
<div class="sw" style="border-radius:12px"><b>xl</b>12px · hero</div>
</div>
<p style="margin-top:14px;font-size:12px;color:var(--tm-text-muted)">Mais sóbrio que SaaS típico — radii pequenos, papel técnico.</p>
</body></html>
