<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--tm-bg);padding:0;color:var(--tm-text);font-family:var(--TM-font-sans)}
.h{background:#FFF;border-bottom:1px solid var(--tm-border);padding:14px 24px;display:flex;align-items:center;gap:18px;box-shadow:var(--TM-shadow-sm)}
.brand{display:flex;align-items:center;gap:10px}
.brand h1{font-family:var(--TM-font-serif);font-weight:600;font-size:18px;margin:0;letter-spacing:-.005em}
.dot{width:10px;height:10px;background:#C8541C}
.b{display:inline-flex;align-items:center;font-family:var(--TM-font-mono);font-size:10px;font-weight:600;letter-spacing:.12em;padding:3px 8px;border-radius:3px;background:#1A1A1A;color:#FFF}
.nav{display:flex;gap:2px;flex:1;margin-left:18px}
.nav a{padding:8px 14px;border-radius:4px;text-decoration:none;color:var(--tm-text-muted);font-weight:500;font-size:14px}
.nav a.act{background:#FBEDE3;color:#A6451A;border-bottom:2px solid #C8541C;border-radius:4px 4px 0 0}
.toggle{padding:8px 12px;border-radius:6px;border:1px solid var(--tm-border);background:#FFF;font-family:inherit;font-size:13px;color:var(--tm-text);cursor:pointer;display:flex;align-items:center;gap:8px}
</style></head><body>
<div class="h">
<div class="brand"><span class="dot"></span><h1>TM Construtora</h1><span class="b">v2.0</span></div>
<nav class="nav"><a class="act">Inspeções</a><a>Relatórios</a><a>Obras</a><a>Equipe</a><a>Configurações</a></nav>
<button class="toggle"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>Tema</button>
</div>
</body></html>
