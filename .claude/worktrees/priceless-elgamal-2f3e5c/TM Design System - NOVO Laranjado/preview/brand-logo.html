<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:var(--tm-bg);padding:32px;color:var(--tm-text);font-family:var(--TM-font-sans);display:flex;justify-content:center}
.brand{display:flex;align-items:center;gap:14px}
.dot{width:18px;height:18px;background:#C8541C;flex-shrink:0}
.brand h1{font-family:var(--TM-font-serif);font-weight:600;font-size:32px;margin:0;color:var(--tm-text);letter-spacing:-.015em;line-height:1}
.brand .sub{font-family:var(--TM-font-mono);font-size:10px;letter-spacing:.18em;color:var(--tm-text-subtle);text-transform:uppercase;margin-top:4px}
.divider{width:1px;height:42px;background:var(--tm-border);margin:0 4px}
.b{display:inline-flex;align-items:center;font-family:var(--TM-font-mono);font-size:11px;font-weight:600;letter-spacing:.12em;padding:4px 10px;border-radius:3px;background:#1A1A1A;color:#FFF}
</style></head><body>
<div class="brand">
<span class="dot"></span>
<div><h1>TM Construtora</h1><div class="sub">ENGENHARIA · MANUTENÇÃO PREDIAL</div></div>
<div class="divider"></div>
<span class="b">v2.0</span>
</div>
</body></html>
