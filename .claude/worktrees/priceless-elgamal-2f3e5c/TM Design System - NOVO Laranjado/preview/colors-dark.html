<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
body{margin:0;background:#0f172a;font-family:var(--TM-font-sans);padding:20px;color:#d1d5db}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.sw{border-radius:var(--TM-radius-md);overflow:hidden;border:1px solid #4b5563;background:#1e293b}
.chip{height:64px}
.meta{padding:8px 10px}
.name{font-size:12px;font-weight:600;color:#d1d5db}
.hex{font-family:var(--TM-font-mono);font-size:11px;color:#a1a1aa}
</style></head><body>
<div class="row">
<div class="sw"><div class="chip" style="background:#0f172a;border-bottom:1px solid #4b5563"></div><div class="meta"><div class="name">bg</div><div class="hex">#0f172a</div></div></div>
<div class="sw"><div class="chip" style="background:#1e293b;border-bottom:1px solid #4b5563"></div><div class="meta"><div class="name">bg-card</div><div class="hex">#1e293b</div></div></div>
<div class="sw"><div class="chip" style="background:#34d399"></div><div class="meta"><div class="name">primary</div><div class="hex">#34d399</div></div></div>
<div class="sw"><div class="chip" style="background:linear-gradient(135deg,#34d399,#06b6d4)"></div><div class="meta"><div class="name">gradient</div><div class="hex">135°</div></div></div>
<div class="sw"><div class="chip" style="background:#d1d5db"></div><div class="meta"><div class="name">text</div><div class="hex">#d1d5db</div></div></div>
<div class="sw"><div class="chip" style="background:#a1a1aa"></div><div class="meta"><div class="name">text-muted</div><div class="hex">#a1a1aa</div></div></div>
<div class="sw"><div class="chip" style="background:#6b7280"></div><div class="meta"><div class="name">text-subtle</div><div class="hex">#6b7280</div></div></div>
<div class="sw"><div class="chip" style="background:#4b5563"></div><div class="meta"><div class="name">border</div><div class="hex">#4b5563</div></div></div>
</div>
</body></html>
