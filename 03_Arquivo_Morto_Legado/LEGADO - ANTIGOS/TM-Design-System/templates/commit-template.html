<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Desenvolvimento - [NOME DO PROJETO]</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        /* ═══════════════════════════════════════════
           DIREÇÕES:
           1. Cole aqui o tema desejado (:root)
           2. Cole aqui o conteúdo de tm-timeline.css
           ═══════════════════════════════════════════ */
    </style>
</head>

<body>
    <div class="bg-particles"></div>

    <section class="hero">
        <div class="hero-badge">📋 Registro de Desenvolvimento</div>
        <h1>[Título do Projeto]</h1>
        <p class="hero-subtitle">[Subtítulo ou descrição curta do projeto]</p>
        <div class="hero-brand">
            <span class="company">TM - Sempre Tecnologia</span>
            <span class="separator">|</span>
            <span>Thiago Nascimento Barbosa</span>
        </div>
    </section>

    <div class="stats-bar">
        <!-- Itens de estatística aqui -->
    </div>

    <section class="timeline-section">
        <div class="timeline-header">
            <span class="timeline-title">Linha do Tempo</span>
            <div class="timeline-nav">
                <button onclick="scrollTimeline(-1)">←</button>
                <button onclick="scrollTimeline(1)">→</button>
            </div>
        </div>
        <div class="timeline-track-wrapper" id="timelineWrapper">
            <div class="timeline-track">
                <div class="timeline-line"></div>
                <!-- timeline-node items aqui -->
            </div>
        </div>
    </section>

    <div class="detail-card-area">
        <!-- detail-card items aqui -->
    </div>

    <footer class="footer">
        <div class="footer-divider"></div>
        <div class="footer-status">Modernização Concluída</div>
        <div class="footer-company">TM - Sempre Tecnologia</div>
        <div class="footer-author">Desenvolvido por: Thiago Nascimento Barbosa</div>
    </footer>

    <script>
        // Scripts de tm-timeline.css base (scroll e navegação)
    </script>
</body>

</html>
